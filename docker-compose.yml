version: "3.9"

services:

  api:
    build:
    ports:
      -"8000:8000"
    volumes:
      -./models:/app/models
      -.data:/app/outputs
    restart: unless-stopped

  frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      -.:/app
    ports:
      -"8501:8501"
    command: >
      sh -c "pip install streamlit requests pandas --quiet &&
      streamlit run frontend/streamlit_app.py --server.port 8000 --server.address 0.0.0.0"
    depends_on:
      -api
    restart: unless-stopped
